<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gold Suresh — Image Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:#1a1035; font-family:'Inter',system-ui,Arial; color:#fff; min-height:100vh; }

    header {
      background:rgba(255,255,255,0.05);
      border-bottom:1px solid rgba(255,255,255,0.1);
      padding:14px 24px;
      display:flex; align-items:center; justify-content:space-between;
    }
    header h1 { font-size:15px; font-weight:700; color:#f8fafc; }
    header span { font-size:12px; color:#94a3b8; }

    .page { max-width:900px; margin:0 auto; padding:28px 20px; }

    .controls {
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:14px;
      padding:22px 24px;
      margin-bottom:24px;
      display:grid;
      grid-template-columns:1fr 1fr 1fr 1fr;
      gap:14px;
      align-items:end;
    }
    .field { display:flex; flex-direction:column; gap:6px; }
    .field label { font-size:11px; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.07em; }
    .field input {
      height:44px; border-radius:8px;
      border:1.5px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.08);
      color:#fff; font-size:16px; font-weight:700;
      padding:0 12px; outline:none;
      transition:border-color 0.15s;
    }
    .field input:focus { border-color:#F5C842; }
    .field input[readonly] { color:#F5C842; cursor:default; font-size:13px; }

    .gen-btn {
      height:44px; border-radius:8px;
      background:#F5C842; border:none;
      color:#1a1035; font-size:14px; font-weight:800;
      cursor:pointer; transition:opacity 0.15s;
      width:100%; margin-top:0;
    }
    .gen-btn:hover { opacity:0.88; }

    /* Canvas preview area */
    .preview-wrap {
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:16px;
      padding:24px;
      text-align:center;
    }
    .preview-label {
      font-size:11px; font-weight:600; color:#64748b;
      text-transform:uppercase; letter-spacing:0.08em;
      margin-bottom:16px;
    }
    canvas {
      max-width:100%; border-radius:12px;
      box-shadow:0 20px 60px rgba(0,0,0,0.5);
    }
    .dl-btn {
      display:inline-block; margin-top:18px;
      padding:11px 32px; background:#F5C842;
      color:#1a1035; font-size:14px; font-weight:800;
      border-radius:99px; cursor:pointer; border:none;
      transition:opacity 0.15s;
    }
    .dl-btn:hover { opacity:0.88; }

    @media(max-width:580px) {
      .controls { grid-template-columns:1fr 1fr; }
    }
    @media(max-width:380px) {
      .controls { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>⚡ Gold Price Image Generator</h1>
  <span>Generates 1200×630 shareable image</span>
</header>

<div class="page">
  <div class="controls">
    <div class="field">
      <label>Date</label>
      <input type="text" id="iDate" readonly />
    </div>
    <div class="field">
      <label>22K ₹/gram</label>
      <input type="number" id="i22" placeholder="14120" />
    </div>
    <div class="field">
      <label>24K ₹/gram</label>
      <input type="number" id="i24" placeholder="15404" />
    </div>
    <div class="field">
      <label>18K ₹/gram</label>
      <input type="number" id="i18" placeholder="11553" />
    </div>
    <div class="field" style="grid-column:1/-1">
      <button class="gen-btn" onclick="generateImage()">Generate Image ✦</button>
    </div>
  </div>

  <div class="preview-wrap">
    <div class="preview-label">Preview — 1200 × 630</div>
    <canvas id="c" width="1200" height="630"></canvas>
    <br>
    <button class="dl-btn" id="dlBtn" onclick="downloadImage()">Download PNG</button>
  </div>
</div>

<script>
// ── Auto date ─────────────────────────────────────────────────────────────────
(function(){
  var now = new Date();
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('iDate').value = now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
})();

// ── Auto-load India rates from goldRate.json ──────────────────────────────────
fetch('goldRate.json', {cache:'no-store'})
  .then(function(r){ return r.json(); })
  .then(function(d){
    if (d.India) {
      if (d.India['22K']) document.getElementById('i22').value = d.India['22K'];
      if (d.India['24K']) document.getElementById('i24').value = d.India['24K'];
      if (d.India['18K']) document.getElementById('i18').value = d.India['18K'];
    }
    generateImage();
  })
  .catch(function(){ generateImage(); });

// ── Suresh image ──────────────────────────────────────────────────────────────


// ── Format ─────────────────────────────────────────────────────────────────────
function fmt(n) {
  return '₹' + Number(n).toLocaleString('en-IN');
}

// ── Generate ───────────────────────────────────────────────────────────────────
function generateImage() {
  var dateStr = document.getElementById('iDate').value;
  var r22 = +document.getElementById('i22').value || 14120;
  var r24 = +document.getElementById('i24').value || 15404;
  var r18 = +document.getElementById('i18').value || 11553;

  var c = document.getElementById('c');
  var ctx = c.getContext('2d');
  var W = 1200, H = 630;

  // ── Background — deep violet gradient ───────────────────────────────────────
  var bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0,   '#2D1B69');
  bg.addColorStop(0.5, '#1E1245');
  bg.addColorStop(1,   '#0F0A2A');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // ── Decorative circles (credit card feel) ────────────────────────────────────
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#F5C842';
  ctx.beginPath(); ctx.arc(980, -80, 350, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(1050, 580, 280, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 0.04;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(120, 580, 300, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ── Gold shimmer line across top ─────────────────────────────────────────────
  var shimmer = ctx.createLinearGradient(0, 0, W, 0);
  shimmer.addColorStop(0,   'rgba(245,200,66,0)');
  shimmer.addColorStop(0.3, 'rgba(245,200,66,0.7)');
  shimmer.addColorStop(0.7, 'rgba(245,200,66,0.7)');
  shimmer.addColorStop(1,   'rgba(245,200,66,0)');
  ctx.fillStyle = shimmer;
  ctx.fillRect(0, 0, W, 3);

  // ── Gold shimmer line across bottom ──────────────────────────────────────────
  ctx.fillStyle = shimmer;
  ctx.fillRect(0, H-3, W, 3);

  // ── Vertical divider ─────────────────────────────────────────────────────────
  var divider = ctx.createLinearGradient(0, 60, 0, H-60);
  divider.addColorStop(0,   'rgba(245,200,66,0)');
  divider.addColorStop(0.3, 'rgba(245,200,66,0.4)');
  divider.addColorStop(0.7, 'rgba(245,200,66,0.4)');
  divider.addColorStop(1,   'rgba(245,200,66,0)');
  ctx.fillStyle = divider;
  

  // ── LEFT SIDE — Text content ──────────────────────────────────────────────────
  var LX = 72;

  // Website name
  ctx.font = '600 22px Inter, Arial';
  ctx.fillStyle = 'rgba(245,200,66,0.9)';
  ctx.fillText('GoldRateCalculator.in', LX, 72);

  // Main headline
  ctx.font = '800 58px Inter, Arial';
  ctx.fillStyle = '#ffffff';
  ctx.fillText("Today's Gold", LX, 155);
  ctx.fillText("Rate — India", LX, 225);

  // Date
  ctx.font = '500 22px Inter, Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText(dateStr, LX, 275);

  // Divider line under headline
  var hline = ctx.createLinearGradient(LX, 0, LX+380, 0);
  hline.addColorStop(0, 'rgba(245,200,66,0.8)');
  hline.addColorStop(1, 'rgba(245,200,66,0)');
  ctx.fillStyle = hline;
  ctx.fillRect(LX, 295, W - LX*2, 2);

  // ── Rate rows ─────────────────────────────────────────────────────────────────
  var rates = [
    { karat:'22K Gold', purity:'916 · Jewellery', val:r22, highlight:true },
    { karat:'24K Gold', purity:'999 · Investment', val:r24, highlight:false },
    { karat:'18K Gold', purity:'750 · Diamond',   val:r18, highlight:false },
  ];

  var rowY = 330;
  rates.forEach(function(rate) {
    // Row background pill for 22K
    if (rate.highlight) {
      var pillGrad = ctx.createLinearGradient(LX-10, rowY-28, LX+420, rowY+18);
      pillGrad.addColorStop(0, 'rgba(245,200,66,0.18)');
      pillGrad.addColorStop(1, 'rgba(245,200,66,0.04)');
      ctx.fillStyle = pillGrad;
      roundRect(ctx, LX-10, rowY-30, W - LX - 52, 58, 10);
    }

    // Karat label
    ctx.font = '700 20px Inter, Arial';
    ctx.fillStyle = rate.highlight ? '#F5C842' : 'rgba(255,255,255,0.6)';
    ctx.fillText(rate.karat, LX + 4, rowY);

    // Purity tag
    ctx.font = '500 14px Inter, Arial';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText(rate.purity, LX + 4, rowY + 18);

    // Price — right aligned
    ctx.font = rate.highlight ? '800 30px Inter, Arial' : '700 26px Inter, Arial';
    ctx.fillStyle = rate.highlight ? '#F5C842' : 'rgba(255,255,255,0.85)';
    var priceStr = fmt(rate.val) + '/g';
    var pw = ctx.measureText(priceStr).width;
    ctx.fillText(priceStr, W - 72 - pw, rowY + 4);

    rowY += 75;
  });

  // ── Footer tag ────────────────────────────────────────────────────────────────
  ctx.font = '500 16px Inter, Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillText('Updated daily · Free calculator at GoldRateCalculator.in', LX, H - 36);

  // ── Round rect helper ──────────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
  ctx.fill();
}

// ── Download ───────────────────────────────────────────────────────────────────
function downloadImage() {
  var c = document.getElementById('c');
  var now = new Date();
  var months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
  var fname = 'gold-rate-' + now.getDate() + '-' + months[now.getMonth()] + '-' + now.getFullYear() + '.png';
  var link = document.createElement('a');
  link.download = fname;
  link.href = c.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
