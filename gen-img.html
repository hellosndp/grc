<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gold Price Image Generator — GoldRateCalculator.in</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:#f8fafc; font-family:'Inter',system-ui,Arial; color:#111827; padding:24px 16px; }
    h1 { font-size:18px; font-weight:700; margin-bottom:20px; }
    .rate-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:12px; }
    .field label { display:block; font-size:11px; font-weight:600; color:#6b7280; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:5px; }
    .field input { width:100%; height:42px; border:1.5px solid #d1d5db; border-radius:8px; padding:0 12px; font-size:16px; font-weight:700; color:#111827; background:#fff; outline:none; }
    .field input:focus { border-color:#111827; }
    .gen-btn { width:100%; height:46px; background:#111827; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; margin-bottom:20px; }
    .gen-btn:hover { background:#374151; }
    .preview-wrap { text-align:center; }
    .preview-label { font-size:11px; color:#9ca3af; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:10px; }
    canvas { max-width:100%; border-radius:10px; box-shadow:0 4px 24px rgba(0,0,0,0.12); }
    .dl-btn { display:inline-block; margin-top:14px; padding:10px 28px; background:#111827; color:#fff; border:none; border-radius:99px; font-size:14px; font-weight:700; cursor:pointer; }
    .dl-btn:hover { background:#374151; }
    @media(max-width:480px) { .rate-row { grid-template-columns:1fr; } }
  </style>
</head>
<body>

<h1>Gold Price Image Generator</h1>

<div class="rate-row">
  <div class="field"><label>22K ₹/gram</label><input type="number" id="i22" placeholder="14120" /></div>
  <div class="field"><label>24K ₹/gram</label><input type="number" id="i24" placeholder="15404" /></div>
  <div class="field"><label>18K ₹/gram</label><input type="number" id="i18" placeholder="11553" /></div>
</div>
<button class="gen-btn" onclick="generateImage()">Generate Image</button>

<div class="preview-wrap">
  <div class="preview-label">Preview — 1200 × 630</div>
  <canvas id="c" width="1200" height="630"></canvas>
  <br>
  <button class="dl-btn" onclick="downloadImage()">Download PNG</button>
</div>

<script>
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function todayStr()  { var d=new Date(); return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear(); }
function todaySlug() { var d=new Date(); return d.getDate()+'-'+MONTHS[d.getMonth()].toLowerCase()+'-'+d.getFullYear(); }
function todayDay()  { return DAYS[new Date().getDay()]; }
function fmt(n)      { return String.fromCharCode(8377)+Number(n).toLocaleString('en-IN'); }

fetch('goldRate.json',{cache:'no-store'})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.India){
      if(d.India['22K']) document.getElementById('i22').value=d.India['22K'];
      if(d.India['24K']) document.getElementById('i24').value=d.India['24K'];
      if(d.India['18K']) document.getElementById('i18').value=d.India['18K'];
    }
    generateImage();
  })
  .catch(function(){generateImage();});

function generateImage(){
  var r22=+document.getElementById('i22').value||14120;
  var r24=+document.getElementById('i24').value||15404;
  var r18=+document.getElementById('i18').value||11553;

  var canvas=document.getElementById('c');
  var ctx=canvas.getContext('2d');
  var W=1200,H=630;
  ctx.clearRect(0,0,W,H);

  // ── BACKGROUND — near black with very subtle warm tint ──────────────────────
  ctx.fillStyle='#0A0A0F';
  ctx.fillRect(0,0,W,H);

  // subtle noise texture feel via thin horizontal lines
  ctx.save();
  ctx.globalAlpha=0.018;
  ctx.fillStyle='#fff';
  for(var i=0;i<H;i+=2){ ctx.fillRect(0,i,W,1); }
  ctx.restore();

  // ── GOLD accent strip — top ──────────────────────────────────────────────────
  var topStrip=ctx.createLinearGradient(0,0,W,0);
  topStrip.addColorStop(0,'rgba(245,200,66,0)');
  topStrip.addColorStop(0.15,'rgba(245,200,66,1)');
  topStrip.addColorStop(0.85,'rgba(245,200,66,1)');
  topStrip.addColorStop(1,'rgba(245,200,66,0)');
  ctx.fillStyle=topStrip;
  ctx.fillRect(0,0,W,5);

  // ── TOP ROW — site + date ────────────────────────────────────────────────────
  // Site name — left
  ctx.font='600 20px Inter,Arial';
  ctx.fillStyle='rgba(245,200,66,0.75)';
  ctx.textAlign='left';
  ctx.fillText('GoldRateCalculator.in',64,58);

  // Date — right
  ctx.font='500 20px Inter,Arial';
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.textAlign='right';
  ctx.fillText(todayDay().toUpperCase()+', '+todayStr().toUpperCase(),W-64,58);
  ctx.textAlign='left';

  // ── GIANT 22K RATE — hero number ─────────────────────────────────────────────
  // Label
  ctx.font='700 18px Inter,Arial';
  ctx.fillStyle='rgba(245,200,66,0.6)';
  ctx.fillText('22K GOLD — 916 — JEWELLERY',64,118);

  // The number itself — massive
  ctx.font='900 210px Inter,Arial';
  var goldGrad=ctx.createLinearGradient(60,100,900,340);
  goldGrad.addColorStop(0,'#FFE27A');
  goldGrad.addColorStop(0.4,'#F5C842');
  goldGrad.addColorStop(1,'#C8930A');
  ctx.fillStyle=goldGrad;
  ctx.fillText(fmt(r22),60,318);

  // per gram suffix — aligned to bottom right of the number
  var numW=ctx.measureText(fmt(r22)).width;
  ctx.font='500 24px Inter,Arial';
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fillText('per gram',60,358);

  // ── BOTTOM ROW — 24K and 18K + dividers ──────────────────────────────────────
  // Horizontal rule
  ctx.save();
  ctx.globalAlpha=0.12;
  ctx.fillStyle='#fff';
  ctx.fillRect(60,390,W-120,1);
  ctx.restore();

  // 24K block
  var col1x=64;
  ctx.font='600 15px Inter,Arial';
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.fillText('24K GOLD  ·  999  ·  INVESTMENT',col1x,432);
  ctx.font='800 52px Inter,Arial';
  ctx.fillStyle='rgba(255,255,255,0.82)';
  ctx.fillText(fmt(r24),col1x,498);
  ctx.font='400 14px Inter,Arial';
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.fillText('per gram',col1x,520);

  // Vertical divider between 24K and 18K
  ctx.save();
  ctx.globalAlpha=0.1;
  ctx.fillStyle='#fff';
  ctx.fillRect(620,400,1,130);
  ctx.restore();

  // 18K block
  var col2x=640;
  ctx.font='600 15px Inter,Arial';
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.fillText('18K GOLD  ·  750  ·  DIAMOND',col2x,432);
  ctx.font='800 52px Inter,Arial';
  ctx.fillStyle='rgba(255,255,255,0.82)';
  ctx.fillText(fmt(r18),col2x,498);
  ctx.font='400 14px Inter,Arial';
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.fillText('per gram',col2x,520);

  // ── BOTTOM STRIP ─────────────────────────────────────────────────────────────
  // Horizontal rule
  ctx.save();
  ctx.globalAlpha=0.1;
  ctx.fillStyle='#fff';
  ctx.fillRect(60,548,W-120,1);
  ctx.restore();

  ctx.font='400 16px Inter,Arial';
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillText('Source: IBJA  ·  Updated daily  ·  Calculate your exact jewellery price at goldratecalculator.in',64,586);

  // ── Bottom gold strip ─────────────────────────────────────────────────────────
  ctx.fillStyle=topStrip;
  ctx.fillRect(0,H-5,W,5);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function downloadImage(){
  var canvas=document.getElementById('c');
  var link=document.createElement('a');
  link.download='gold-rate-india-today-'+todaySlug()+'.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
